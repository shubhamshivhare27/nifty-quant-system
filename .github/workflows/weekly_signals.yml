name: Weekly Signal Engine
on:
  schedule:
    - cron: '30 15 * * 5'
  workflow_dispatch:
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python master_list.py
      - run: python live_signals_weekly.p
      - env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
          RECIPIENT:  ${{ secrets.RECIPIENT_EMAIL }}
          REPORT_TYPE: weekly
          STREAMLIT_URL: ${{ secrets.STREAMLIT_URL }}
        run: python email_report.py
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add signals/ || true
          git diff --staged --quiet || git commit -m "Weekly signals $(date +'%Y-%m-%d')"
          git push || true
